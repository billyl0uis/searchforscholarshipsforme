name: Craft Scholarship Crawler

on:
  schedule:
    - cron: '0 14 * * 0'  # Sunday 9am ET (UTC-5 in winter, UTC-4 in summer)
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          set -euo pipefail
          echo "=== Installing pip dependencies ==="
          pip install --upgrade pip
          pip install -r requirements.txt
          echo "=== Installed packages ==="
          pip list

      - name: Check environment
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
        run: |
          set -euo pipefail
          echo "=== Environment check ==="
          echo "Python version: $(python --version)"
          echo "Working directory: $(pwd)"
          echo "Files present: $(ls -la)"
          if [ -z "${GEMINI_API_KEY:-}" ]; then
            echo "ERROR: GEMINI_API_KEY secret is not set or is empty."
            echo "Go to: Settings -> Secrets and variables -> Actions -> New repository secret"
            echo "Add secret named GEMINI_API_KEY (free key from https://aistudio.google.com)"
            exit 1
          else
            echo "GEMINI_API_KEY: set (length=${#GEMINI_API_KEY})"
          fi
          if [ -z "${SENDGRID_API_KEY:-}" ]; then
            echo "WARNING: SENDGRID_API_KEY not set — digest will be saved to digest_preview.html instead of emailed"
          else
            echo "SENDGRID_API_KEY: set (length=${#SENDGRID_API_KEY})"
          fi

      - name: Check database status
        run: |
          if [ -f scholarships.db ]; then
            echo "=== Existing database found ==="
            ls -lh scholarships.db
          else
            echo "=== No existing database — this is a first run, starting fresh ==="
          fi

      - name: Run crawler
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: |
          set -euo pipefail
          echo "=== Starting main crawler ==="
          python -u main.py
          echo "=== Crawler finished ==="

      - name: Save database to repo
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git pull --rebase origin main
          git add scholarships.db
          git diff --staged --quiet && echo "No DB changes to commit" || git commit -m "Update scholarships database [$(date -u +%Y-%m-%d)]"
          git push

      - name: Upload email preview (if SendGrid not configured)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: digest-preview
          path: digest_preview.html
          retention-days: 7
        continue-on-error: true
