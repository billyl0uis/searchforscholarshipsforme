email:
  recipient: info@billylouis.com
  sender: bailey.lou.wheeler@icloud.com

# API keys are read from environment variables / GitHub Actions secrets:
#   GEMINI_API_KEY  — get a free key at aistudio.google.com
#   SENDGRID_API_KEY — get one at sendgrid.com (free tier works)

crawl:
  max_depth: 3
  per_site_timeout_seconds: 90   # hard-coded in crawler.py via asyncio.wait_for()
  per_site_page_cap: 20          # hard-coded in crawler.py
  global_timeout_seconds: 2700   # 45 minutes — hard-coded in crawler.py
  internal_links_only: true
  keyword_flags:
    - scholarship
    - grant
    - award
    - fellowship
    - assistantship
    - work-study
    - stipend
    - funded
    - tuition waiver
    - emerging artist

